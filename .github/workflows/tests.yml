name: tests

on:
  push:
    branches-ignore:
    - master

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout git repository
        uses: actions/checkout@v6
      - name: Install golang
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
      - name: Run tests
        run: go test ./... -race -parallel 2 -shuffle on -v
        env:
          CGO_ENABLED: 1
      - name: Run linters
        uses: golangci/golangci-lint-action@v9
